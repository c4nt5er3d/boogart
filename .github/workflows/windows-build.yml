name: Windows Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Test
        run: python -m unittest discover -s tests

      - name: Build exe
        run: python -m PyInstaller packaging/Boogart.spec --noconfirm

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: Boogart-windows
          path: dist/Boogart.exe
