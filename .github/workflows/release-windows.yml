name: Release Windows

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Test
        run: python -m unittest discover -s tests

      - name: Build exe
        run: python -m PyInstaller packaging/Boogart.spec --noconfirm

      - name: Prepare release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist/Boogart.exe release/Boogart.exe
          Compress-Archive -Path release/Boogart.exe -DestinationPath release/Boogart-windows.zip -Force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Boogart ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            release/Boogart.exe
            release/Boogart-windows.zip
